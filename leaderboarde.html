<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="bg.png" />
    <link rel="icon" type="image/png" href="bg.png"/>
    <title>قُرَّاؤُنَا - قائمة المتصدرين لـ10 سفلي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --glass: rgba(163, 186, 207, 0.5);
            --error-red: rgba(255, 100, 100, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Amiri', serif;
            background-color: #f0f4f8;
            background-image: url('bg.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: right;
            background-position-x: 72.5vw;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        canvas#bubbleCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            pointer-events: none;
        }

        h1 {
            font-size: 5rem;
            color: #2c3e50;
            margin: 30px 0;
            z-index: 2;
            pointer-events: none;
        }
        h2 {
            margin-top: 0%;
            margin-bottom: 2%;
            text-align: center;
            font-size: 30px;
            color: #2c3e50;
            font-family: 'Amiri', serif;
        }
        .leaderboard-container {
            width: 95%;
            max-width: 650px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            z-index: 2;
            margin-bottom: 50px;
            min-height: 100px;
        }

        .list-wrapper { 
            position: relative; 
            padding: 0; margin: 0;
            width: 100%;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: absolute;
            left: 0; right: 0;
            box-sizing: border-box;
        }

        .name { font-size: 1.8rem; font-weight: 700; color: #2c3e50; display: flex; align-items: center; gap: 15px; }
        .score { font-size: 1.8rem; font-weight: 700; color: #1a2a3a; }
        .medal { display: none; font-size: 2rem; }
        .final-mode .medal { display: inline-block; }

        #status-grid {
            position: fixed;
            bottom: 20px; left: 20px;
            display: grid;
            grid-template-columns: repeat(3, 12px);
            gap: 5px;
            z-index: 10;
        }

        .sq {
            width: 12px; height: 12px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 2px;
            transition: background 0.2s ease;
        }

        .sq.active-input { background: rgba(100, 120, 140, 0.5); } 
        .sq.active-9-green { background: rgba(144, 238, 144, 0.7); }
        .sq.active-9-yellow { background: rgba(255, 255, 150, 0.7); }
        .sq.active-error { background: var(--error-red); }
    </style>
</head>
<body>

    <canvas id="bubbleCanvas"></canvas>
    <h1>قُرَّاؤُنَا</h1>

    <div class="leaderboard-container">
        <div id="category"><h2>10 من الأسفل</h2></div>
        <div id="board" class="list-wrapper"></div>
    </div>

    <div id="status-grid">
        <div class="sq" id="sq1"></div><div class="sq" id="sq2"></div><div class="sq" id="sq3"></div>
        <div class="sq" id="sq4"></div><div class="sq" id="sq5"></div><div class="sq" id="sq6"></div>
        <div class="sq" id="sq7"></div><div class="sq" id="sq8"></div><div class="sq" id="sq9"></div>
    </div>

<script>
    /* Kudhinge index, nan*/
    let participants = [
        { id: "1001", name: "أحمد", score: 0 },
        { id: "1002", name: "سارة", score: 0 },
        { id: "1003", name: "محمد", score: 0 },
        { id: "1004", name: "ليلى", score: 0 },
        { id: "1005", name: "يوسف", score: 0 },
        { id: "1006", name: "نورة", score: 0 },
        { id: "1007", name: "أحمد", score: 0 },
        { id: "1008", name: "سارة", score: 0 },
        { id: "1009", name: "محمد", score: 0 },
        { id: "3328", name: "baabaa", score: 0 }
    ];

    const ITEM_H = 65; 
    const GAP = 12;    
    const STEP = ITEM_H + GAP;

    let isListening = false;
    let masterBuffer = "";
    let currentPairBuffer = "";
    let isGameOver = false;

    // --- BUBBLE ENGINE ---
    const canvas = document.getElementById('bubbleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let gatherToCenter = false;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor(mode = 'random') { this.reset(mode); }
        reset(mode) {
            if (mode === 'offscreen') {
                // Pick a random side of the screen to spawn from
                const side = Math.floor(Math.random() * 4);
                const margin = 100; // Distance outside the screen
                
                if (side === 0) { // Top
                    this.x = Math.random() * canvas.width;
                    this.y = -margin;
                } else if (side === 1) { // Right
                    this.x = canvas.width + margin;
                    this.y = Math.random() * canvas.height;
                } else if (side === 2) { // Bottom
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + margin;
                } else { // Left
                    this.x = -margin;
                    this.y = Math.random() * canvas.height;
                }
            } else {
                // Normal bubble behavior
                this.x = mode === 'random' ? Math.random() * canvas.width : Math.random() * canvas.width;
                this.y = mode === 'random' ? Math.random() * canvas.height : canvas.height + 50;
            }

            this.size = Math.random() * 5 + 2;
            this.speed = Math.random() * 0.4 + 0.1;
            this.opacity = Math.random() * 0.3;
            
            // Add a tiny bit of "wobble" for the gathering phase
            this.wobble = Math.random() * 0.02;
        }

        update() {
            if (gatherToCenter) {
                const targetX = canvas.width / 2;
                const targetY = canvas.height / 2;
                
                // Move toward center with a slight organic curve
                this.x += (targetX - this.x) * (0.02 + this.wobble);
                this.y += (targetY - this.y) * (0.02 + this.wobble);
                
                // Shrink as they get closer to "becoming" confetti
                this.size *= 0.99;
            } else {
                this.y -= this.speed;
                // Add a very slight horizontal drift
                this.x += Math.sin(this.y / 50) * 0.2;
                
                if (this.y < -20) this.reset('bottom');
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100, 120, 140, ${this.opacity})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < 50; i++) particles.push(new Particle('random'));
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // --- DYNAMIC LIST ---
    function initBoard() {
        const board = document.getElementById('board');
        board.style.height = (participants.length * STEP) + 'px';
        board.innerHTML = participants.map(p => `
            <div class="list-item" id="item-${p.id}" style="height: ${ITEM_H}px">
                <div class="name"><span class="medal" id="medal-${p.id}"></span>${p.name}</div>
                <div class="score" id="score-${p.id}">${p.score}</div>
            </div>
        `).join('');
        updatePositions();
    }

    function updatePositions() {
        const sorted = [...participants].sort((a, b) => b.score - a.score);
        sorted.forEach((p, index) => {
            const el = document.getElementById(`item-${p.id}`);
            if(el) {
                el.style.transform = `translateY(${index * STEP}px)`;
                document.getElementById(`score-${p.id}`).innerText = p.score;
                if (isGameOver) {
                    const m = document.getElementById(`medal-${p.id}`);
                    m.innerText = index === 0 ? "👑" : index === 1 ? "🥈" : index === 2 ? "🥉" : "";
                }
            }
        });
    }

    // --- INPUT LOGIC ---
    function setLights(type) {
        for(let i=1; i<=9; i++) document.getElementById(`sq${i}`).className = type ? `sq ${type}` : 'sq';
    }

    function triggerError() {
        isListening = false; masterBuffer = ""; currentPairBuffer = "";
        setLights('active-error');
        setTimeout(() => setLights(null), 500);
    }

    window.addEventListener('keydown', (e) => {
        if (isGameOver) return;
        const key = e.key.toLowerCase();

        if (key === 'r') {
            setLights('active-error');
            setTimeout(() => {
                participants.forEach(p => p.score = 0);
                masterBuffer = ""; currentPairBuffer = ""; isListening = false;
                updatePositions(); setLights(null);
            }, 1000);
            return;
        }

        if (key === 'q') { triggerError(); return; }

        if (!isListening && key === 's') {
            isListening = true; masterBuffer = ""; currentPairBuffer = ""; 
            setLights(null);
            document.getElementById('sq1').className = 'sq active-input';
            return;
        }

        if (isListening) {
            if (key === 'd') {
                if (currentPairBuffer.length === 7) {
                    masterBuffer += currentPairBuffer;
                    currentPairBuffer = "";
                    document.getElementById('sq9').className = 'sq active-9-yellow';
                    setTimeout(() => {
                        for(let i=2; i<=9; i++) document.getElementById(`sq${i}`).className = 'sq';
                    }, 500);
                } else { triggerError(); }
            }
            else if (key === 'f') {
                const fullStr = masterBuffer + currentPairBuffer;
                if (fullStr.length > 0 && fullStr.length % 7 === 0) {
                    for (let i = 0; i < fullStr.length; i += 7) {
                        const id = fullStr.substring(i, i+4);
                        const score = parseInt(fullStr.substring(i+4, i+7), 10);
                        const p = participants.find(x => x.id === id);
                        if(p) p.score = score;
                    }
                    updatePositions();
                    document.getElementById('sq9').className = 'sq active-9-green';
                    setTimeout(() => { setLights(null); isListening = false; masterBuffer = ""; currentPairBuffer = ""; }, 500);
                } else { triggerError(); }
            } 
            else if (key === 'l') {
                isGameOver = true;
                document.getElementById('status-grid').style.display = 'none';
                document.getElementById('board').parentElement.classList.add('final-mode');
                updatePositions();
                gatherToCenter = true;
                for(let i=0; i<150; i++) setTimeout(() => particles.push(new Particle('offscreen')), Math.random()*800);
                setTimeout(() => {
                    particles = [];
                    confetti({ particleCount: 300, spread: 120, origin: { x: 0.5, y: 0.5 } });
                }, 3000);
            } 
            else if (!isNaN(key)) {
                if (currentPairBuffer.length < 7) {
                    currentPairBuffer += key;
                    const len = currentPairBuffer.length;
                    for(let i=2; i<=8; i++) document.getElementById(`sq${i}`).className = 'sq';
                    for(let i=2; i<=Math.min(1+len, 8); i++) document.getElementById(`sq${i}`).className = 'sq active-input';
                }
            }
        }
    });

    initBoard();
</script>
</body>
</html>
